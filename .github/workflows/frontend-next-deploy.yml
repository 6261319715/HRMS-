name: frontend-next-deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "frontend-next/**"
      - ".github/workflows/frontend-next-deploy.yml"
  push:
    branches: [main]
    paths:
      - "frontend-next/**"
      - ".github/workflows/frontend-next-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_PREVIEW }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_PREVIEW }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL_PREVIEW }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Env sanity gate (preview)
        run: npm run ci:check-env:preview

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (preview)
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build artifacts
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy_preview
        run: |
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = "<!-- frontend-next-preview -->";
            const url = "${{ steps.deploy_preview.outputs.url }}";
            const body = `${marker}
            Frontend Next preview deployed.

            Preview URL: ${url}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_PRODUCTION }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL_PRODUCTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Env sanity gate (production)
        run: npm run ci:check-env:production

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
