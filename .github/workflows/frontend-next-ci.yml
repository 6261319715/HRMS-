name: frontend-next-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/hrms_auth_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  integration-db:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hrms_auth_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/hrms_auth_test
      TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/hrms_auth_test
      RUN_DB_TESTS: "1"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Push schema
        run: npm run db:push

      - name: Integration tests
        run: npm run test:integration
